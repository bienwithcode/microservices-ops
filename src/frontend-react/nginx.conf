server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Rewrite /static/ paths (from backend API) to remove prefix
    rewrite ^/static/(.*)$ /$1 last;

    # SPA fallback - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy - route to backend services
    location /api/products {
        proxy_pass http://productcatalogservice:3551;
    }
    location /api/cart {
        proxy_pass http://cartservice:7071;
    }
    location /api/currencies {
        proxy_pass http://currencyservice:7001;
    }
    location /api/recommendations {
        proxy_pass http://recommendationservice:8081;
    }
    location /api/shipping {
        proxy_pass http://shippingservice:50052;
    }
    location /api/checkout {
        proxy_pass http://checkoutservice:5051;
    }
    location /api/ads {
        proxy_pass http://adservice:9556;
    }

    # CORS headers
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, POST, DELETE, OPTIONS';
    add_header Access-Control-Allow-Headers 'Content-Type, X-Session-Id';

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
